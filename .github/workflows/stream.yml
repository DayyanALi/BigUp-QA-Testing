name: Stream Tests
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Write auth state
      run: |
        echo '${{ secrets.AUTH_STATE }}' > config.json
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Stream tests
      run: npx playwright test tests/stream.spec.ts --workers=1
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-stream
        path: playwright-report/
        retention-days: 30
