name: Stream Tests
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: AUTH_STATE
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Check Secret Presence
      env:
        AUTH_STATE: ${{ secrets.AUTH_STATE }}
      run: |
        if [ -z "$AUTH_STATE" ]; then
          echo "::error::AUTH_STATE secret is EMPTY or MISSING. Please go to Settings > Secrets and variables > Actions and ensure AUTH_STATE is defined."
          exit 1
        fi
    - name: Write auth state
      env:
        AUTH_STATE: ${{ secrets.AUTH_STATE }}
      run: python3 -c "import os; open('config.json', 'w').write(os.environ['AUTH_STATE'])"
    - name: Verify auth state
      run: |
        echo "File size: $(wc -c < config.json) bytes"
        python3 -c "import json; json.load(open('config.json')); print('JSON is valid')"
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Stream tests
      run: npx playwright test tests/stream.spec.ts --workers=1
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-stream
        path: playwright-report/
        retention-days: 30
