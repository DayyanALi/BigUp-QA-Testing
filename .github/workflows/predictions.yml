name: Predictions Tests
on:
  workflow_dispatch:
jobs:
  test:
    name: Run Sequential Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: AUTH_STATE
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    
    # ... [Keep your secret checking/auth state steps here] ...
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # --- CHAINED TESTS START HERE ---
    
    - name: Run TC-PRED-001 (Homepage Feed)
      run: npx playwright test tests/predictions.spec.ts -g "TC-PRED-001" --workers=1

    - name: Run TC-PRED-ACT-001 (6-Pick Entry)
      run: npx playwright test tests/predictions.spec.ts -g "TC-PRED-ACT-001" --workers=1

    - name: Run TC-PRED-ACT-002 (Requirements Check)
      run: npx playwright test tests/predictions.spec.ts -g "TC-PRED-ACT-002" --workers=1

    # --- CHAINED TESTS END HERE ---

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30